# =============================================================================
# gpu-runner.yml — 本模板仓库的 Docker executor GPU Runner 诊断
# =============================================================================
#
# 这些 job 只用于手动检查自建 GPU Docker executor Runner。
# 它们与 quality.yml 分离；quality job 继续使用默认 Docker/shared runner。
#
# 要求：
# - runner executor: docker
# - GPU runner tags: linux, docker, gpu
# - /etc/gitlab-runner/config.toml: [runners.docker] gpus = "all"
# - 宿主机工具：NVIDIA driver、Docker、NVIDIA Container Toolkit
# =============================================================================

variables:
  MLOPS_GPU_IMAGE: "pytorch/pytorch:2.6.0-cuda12.4-cudnn9-devel"

.gpu_manual_rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true

.gpu_docker_preflight:
  stage: gpu
  image: "$MLOPS_GPU_IMAGE"
  extends: .gpu_manual_rules
  tags:
    - linux
    - docker
    - gpu
  timeout: 15m
  needs: []
  before_script:
    - |
      set -euo pipefail
      echo "Runner: ${CI_RUNNER_DESCRIPTION:-unknown}"
      echo "Runner tags: ${CI_RUNNER_TAGS:-unknown}"
      echo "GPU image: ${MLOPS_GPU_IMAGE}"

      if [[ ! -f /.dockerenv ]]; then
        echo "ERROR: 当前 job 没有运行在 Docker executor job 容器中。" >&2
        echo "请确认 runner 使用 executor=docker，且 tags 包含 linux,docker,gpu。" >&2
        exit 1
      fi

      if ! command -v nvidia-smi >/dev/null 2>&1; then
        echo "ERROR: job 容器内找不到 nvidia-smi。" >&2
        echo "请检查 runner config.toml 中的 [runners.docker] gpus = \"all\"。" >&2
        exit 1
      fi

gpu:runner-doctor:
  extends: .gpu_docker_preflight
  script:
    - |
      set -euo pipefail
      echo "== Job 容器环境 =="
      hostname || true
      uname -a
      id
      pwd
      echo

      echo "== NVIDIA 容器运行时 =="
      nvidia-smi
      echo

      echo "gpu:runner-doctor 通过。"

gpu:pytorch-smoke:
  extends: .gpu_docker_preflight
  timeout: 30m
  script:
    - |
      set -euo pipefail
      python - <<'PY'
      import torch

      print("torch:", torch.__version__)
      print("cuda build:", torch.version.cuda)
      print("cuda available:", torch.cuda.is_available())
      print("device count:", torch.cuda.device_count())
      for idx in range(torch.cuda.device_count()):
          props = torch.cuda.get_device_properties(idx)
          print(f"gpu[{idx}]: {props.name}, sm_{props.major}{props.minor}, {props.total_memory // (1024 ** 2)} MiB")

      if not torch.cuda.is_available():
          raise SystemExit("CUDA is not available inside the PyTorch container")
      PY

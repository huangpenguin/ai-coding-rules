# 根 CI 编排文件：定义全局 pipeline 行为，具体 job 拆到 .gitlab/ci/ 下。
# GitLab 会在 push / MR 时读取本文件并创建 pipeline。
#
# 本仓库默认只运行 quality CI。GPU 训练调度属于 mlops-gpu pack，
# 注入到目标项目后会由该 pack 的 .gitlab-ci.yml include train job。

default:
  interruptible: true # MR 有新提交时，取消旧的 pipeline，节省 Runner 资源
  retry:
    max: 1
    when:
      - runner_system_failure # 仅 Runner 系统故障时自动重试
      - stuck_or_timeout_failure

workflow:
  rules:
    # 只在 MR 和 main 分支上创建 pipeline；其他分支 push 不会触发
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

stages:
  - quality # 代码质量检查（Ruff / Pyright）
  - gpu # 手动 GPU Runner 诊断；只应由 linux,shell GPU Runner 执行

variables:
  FF_USE_FASTZIP: "true" # 加速 GitLab artifact / cache 传输
  UV_LINK_MODE: copy

include:
  - local: .gitlab/ci/quality.yml
  - local: .gitlab/ci/gpu-runner.yml

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright (basic, pre-push)
        entry: .venv/bin/pyright -p pyrightconfig.pre-push.json
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

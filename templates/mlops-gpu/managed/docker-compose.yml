services:
  train:
    build: .
    shm_size: "16g"
    working_dir: /workspace
    command: sleep infinity
    environment:
      DATA_DIR: /data
      UV_LINK_MODE: copy
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/workspace
      - /mnt/data:/data:ro
    ports:
      - "6006:6006"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

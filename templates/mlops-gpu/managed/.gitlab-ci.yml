# 根 CI 编排文件：定义全局 pipeline 行为，具体 job 拆到 .gitlab/ci/ 下。
# GitLab 会在 push / MR 时读取本文件并创建 pipeline。
#
# mlops-gpu pack：仅 GPU 训练调度（train.yml）。
# 质量检查（quality.yml）属于 ci-quality pack；若两个 pack 都已 inject，
# 请手动合并根 .gitlab-ci.yml（见 README「Combine GitLab CI」）。

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

stages:
  - deploy

variables:
  FF_USE_FASTZIP: "true"
  UV_LINK_MODE: copy

include:
  - local: .gitlab/ci/train.yml

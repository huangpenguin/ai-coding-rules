# =============================================================================
# train.yml — Docker executor GPU 训练调度
# =============================================================================
#
# 【跑在哪】GPU 服务器上自建的 self-hosted Docker executor Runner。
# GitLab Runner 直接拉起下面 image 指定的 GPU job 容器，job 脚本在容器内执行。
#
# 【Runner 必须配置 GPU Docker executor】
# - runner executor: docker
# - runner tags: linux, docker, gpu
# - /etc/gitlab-runner/config.toml: [runners.docker] gpus = "all"
# - 数据盘: /mnt/data:/data:ro
# - 训练产出（推荐）: /mnt/home:/home:rw（NFS，checkpoint 落盘，job 结束后保留）
#
# 大 checkpoint 写到 Runner 持久盘（scripts/ci_storage.py 规划路径），
# 小文件摘要复制到 workspace 后打成 GitLab Artifacts（短期备份，非主存储）。
# =============================================================================

variables:
  MLOPS_GPU_IMAGE: "pytorch/pytorch:2.6.0-cuda12.4-cudnn9-devel"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  UV_LINK_MODE: copy
  DATA_DIR: "/data"
  MLOPS_STORAGE_USER: "${GITLAB_USER_LOGIN}"
  TRAIN_RUN_NAME: "smoke_linear"
  SMOKE_COMMAND: "python train.py"
  TRAIN_COMMAND: "python train.py"
  MLOPS_ARTIFACTS_DIR: "results/mlops_train"
  MLOPS_ARTIFACTS_EXPIRE: "14 days"

.gpu_docker_base:
  stage: deploy
  image: "$MLOPS_GPU_IMAGE"
  tags:
    - linux
    - docker
    - gpu
  resource_group: gpu-training
  needs: []
  cache:
    key:
      files:
        - pyproject.toml
        - uv.lock
        - requirements.txt
    paths:
      - .venv/
      - .cache/uv/
    policy: pull-push
  before_script:
    - |
      set -euo pipefail

      echo "Runner: ${CI_RUNNER_DESCRIPTION:-unknown}"
      echo "Runner tags: ${CI_RUNNER_TAGS:-unknown}"
      echo "GPU image: ${MLOPS_GPU_IMAGE}"
      echo "DATA_DIR: ${DATA_DIR}"
      echo "MLOPS_STORAGE_USER: ${MLOPS_STORAGE_USER:-<unset>}"

      if ! command -v nvidia-smi >/dev/null 2>&1; then
        echo "ERROR: nvidia-smi not found inside the job container." >&2
        echo "Check GitLab Runner docker executor config: [runners.docker] gpus = \"all\"." >&2
        exit 1
      fi
      nvidia-smi

      if ! command -v uv >/dev/null 2>&1; then
        if ! command -v curl >/dev/null 2>&1; then
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl
          rm -rf /var/lib/apt/lists/*
        fi
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="${HOME}/.local/bin:${PATH}"
      fi

      uv --version

      if [[ ! -f scripts/uv-bootstrap.sh ]]; then
        echo "ERROR: scripts/uv-bootstrap.sh not found. Re-run init-ai add mlops-gpu --update --apply." >&2
        exit 1
      fi

      bash scripts/uv-bootstrap.sh

      if [[ -d .venv ]]; then
        export VIRTUAL_ENV="${CI_PROJECT_DIR}/.venv"
        export PATH="${VIRTUAL_ENV}/bin:${PATH}"
      fi

      if ! command -v python >/dev/null 2>&1; then
        echo "ERROR: python not found after uv-bootstrap." >&2
        exit 1
      fi

      python - <<'PY'
      import torch

      print("torch:", torch.__version__)
      print("cuda build:", torch.version.cuda)
      print("cuda available:", torch.cuda.is_available())
      print("device count:", torch.cuda.device_count())
      if not torch.cuda.is_available():
          raise SystemExit("CUDA is not available inside the GitLab Docker executor job container")
      PY

      if [[ -f scripts/ci_storage.py ]]; then
        echo "== CI storage layout =="
        eval "$(python scripts/ci_storage.py prepare --write-markers --latest-symlink --emit-shell)"
        echo "TRAIN_EXPERIMENTS_ROOT=${TRAIN_EXPERIMENTS_ROOT}"
        echo "TRAIN_TB_LOGGER_ROOT=${TRAIN_TB_LOGGER_ROOT}"
      else
        echo "WARNING: scripts/ci_storage.py not found; outputs default to ./experiments in ephemeral workspace." >&2
      fi

.gpu_collect_artifacts:
  after_script:
    - |
      set -euo pipefail

      artifact_dir="${MLOPS_ARTIFACTS_DIR}/${CI_JOB_NAME}"
      mkdir -p "${artifact_dir}"

      if [[ -f .ci_storage_host_hint ]]; then
        cp .ci_storage_host_hint "${artifact_dir}/storage_host_hint.txt"
      fi
      if [[ -f .ci_experiments_root ]]; then
        cp .ci_experiments_root "${artifact_dir}/experiments_root.txt"
        experiments_root="$(tr -d '\n' < .ci_experiments_root)"
        summary_path="${experiments_root}/${TRAIN_RUN_NAME}/logs/train_summary.json"
        if [[ -f "${summary_path}" ]]; then
          cp "${summary_path}" "${artifact_dir}/train_summary.json"
        fi
      fi

      local_summary="experiments/${TRAIN_RUN_NAME}/logs/train_summary.json"
      if [[ -f "${local_summary}" ]]; then
        cp "${local_summary}" "${artifact_dir}/train_summary.workspace.json"
      fi

      echo "Artifact bundle prepared under ${artifact_dir}"
      find "${artifact_dir}" -type f | sort || true
  artifacts:
    when: always
    expire_in: "$MLOPS_ARTIFACTS_EXPIRE"
    paths:
      - results/mlops_train/
      - .ci_experiments_root
      - .ci_tb_logger_root
      - .ci_storage_host_hint

gpu_smoke:
  extends:
    - .gpu_docker_base
    - .gpu_collect_artifacts
  timeout: 30m
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  script:
    - bash -lc "${SMOKE_COMMAND}"

run_training:
  extends:
    - .gpu_docker_base
    - .gpu_collect_artifacts
  timeout: 12h
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /\[run train\]/'
      when: on_success
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  script:
    - bash -lc "${TRAIN_COMMAND}"
